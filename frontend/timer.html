<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.local.js"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/timer.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="navbar-brand">Pomodoro Timer</h1>
            <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <div class="navbar-menu" id="navbar-menu">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="timer.html" class="nav-link active">Timer</a>
                <a href="tasks.html" class="nav-link">Tasks</a>
                <a href="progress.html" class="nav-link">Progress</a>
                <a href="settings.html" class="nav-link">Settings</a>
                <button id="logout-button" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container nav-main-container">
        <div class="dashboard-header">
            <h1>Focus Timer</h1>
            <p>Use timer controls here. State is saved while you are logged in.</p>
        </div>

        <div class="timer-panel" aria-live="polite">
            <p id="timer-mode-label" class="timer-mode-label">Work Session</p>

            <div class="timer-ring-wrapper">
                <svg class="timer-ring" viewBox="0 0 200 200">
                    <circle class="timer-ring-track" cx="100" cy="100" r="88"/>
                    <circle class="timer-ring-progress" id="timer-ring-progress" cx="100" cy="100" r="88"/>
                </svg>
                <p id="timer-display" class="timer-display">25:00</p>
            </div>

            <div class="timer-mode-toggle">
                <button id="timer-set-work" class="mode-btn active" type="button">Work</button>
                <button id="timer-set-break" class="mode-btn" type="button">Break</button>
            </div>

            <div class="timer-actions">
                <button id="timer-start-pause" class="btn btn-primary" type="button">Start</button>
                <button id="timer-plus-30" class="btn btn-secondary" type="button">+30s</button>
                <button id="timer-reset" class="btn btn-secondary" type="button">Reset</button>
            </div>

            <div class="timer-input-row">
                <label for="timer-seconds-input">Set seconds</label>
                <input id="timer-seconds-input" type="number" min="0" max="86400" value="1500">
                <button id="timer-apply" class="btn btn-secondary" type="button">Apply</button>
            </div>

            <p id="timer-save-status" class="timer-save-status">Saved</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/timer.js"></script>
</body>
</html>
