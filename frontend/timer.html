<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - Timer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/timer.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="navbar-brand">Pomodoro Timer</h1>
            <div class="navbar-menu">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="timer.html" class="nav-link active">Timer</a>
                <a href="tasks.html" class="nav-link">Tasks</a>
                <a href="progress.html" class="nav-link">Progress</a>
                <a href="settings.html" class="nav-link">Settings</a>
                <button id="logout-button" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container nav-main-container">
        <div class="dashboard-header">
            <h1>Focus Timer</h1>
            <p>Use timer controls here. State is saved while you are logged in.</p>
        </div>

        <div class="timer-panel" aria-live="polite">
            <h2>Session Timer</h2>
            <p id="timer-mode-label" class="timer-mode-label">Work Session</p>
            <p id="timer-display" class="timer-display">25:00</p>

            <div class="timer-actions">
                <button id="timer-start-pause" class="btn btn-primary" type="button">Start</button>
                <button id="timer-plus-30" class="btn btn-secondary" type="button">+30s</button>
                <button id="timer-reset" class="btn btn-secondary" type="button">Reset</button>
            </div>

            <div class="timer-mode-actions">
                <button id="timer-set-work" class="btn btn-secondary" type="button">Work Time</button>
                <button id="timer-set-break" class="btn btn-secondary" type="button">Break Time</button>
            </div>

            <div class="timer-input-row">
                <label for="timer-seconds-input">Set seconds</label>
                <input id="timer-seconds-input" type="number" min="0" max="86400" value="1500">
                <button id="timer-apply" class="btn btn-secondary" type="button">Apply</button>
            </div>

            <p id="timer-save-status" class="timer-save-status">Saved</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/timer.js"></script>
</body>
</html>
