<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - Tasks</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tab-page.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="navbar-brand">Pomodoro Timer</h1>
            <div class="navbar-menu">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="timer.html" class="nav-link">Timer</a>
                <a href="tasks.html" class="nav-link active">Tasks</a>
                <a href="progress.html" class="nav-link">Progress</a>
                <a href="settings.html" class="nav-link">Settings</a>
                <button id="logout-button" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container nav-main-container">
        <div class="dashboard-header">
            <h1>Tasks</h1>
            <p>Create up to your next priorities and manage them with one click.</p>
        </div>

        <div class="tab-card task-card">
            <h2>Task List</h2>
            <form id="task-form" class="task-form">
                <label class="task-input-label" for="task-input">Task Description</label>
                <textarea id="task-input" name="description" maxlength="140" placeholder="Type your task description here..." rows="2" required autofocus></textarea>
                <button id="task-submit-button" class="btn btn-primary" type="submit">Add Task</button>
                <button id="task-cancel-edit" class="btn btn-secondary" type="button" hidden>Cancel</button>
            </form>

            <p id="task-status" class="task-status" aria-live="polite"></p>

            <div class="task-list-shell" aria-label="Task list">
                <ul id="task-list" class="task-list"></ul>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=20260324h"></script>
    <script src="js/auth.js?v=20260324h"></script>
    <script src="js/tasks.js?v=20260324h"></script>
</body>
</html>
