<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.local.js"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Pomodoro Timer</h1>
            <p class="auth-subtitle">Welcome back</p>
            
            <div id="error-message" class="error-message" style="display: none;"></div>
            <div id="success-message" class="success-message" style="display: none;"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email" 
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            minlength="6"
                            required
                        >
                        <button type="button" class="toggle-password" aria-label="Show password">👁</button>
                    </div>
                </div>

                <div class="form-group checkbox">
                    <input 
                        type="checkbox" 
                        id="remember-me" 
                        name="remember-me"
                    >
                    <label for="remember-me">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Sign up here</a></p>
                <button type="button" class="forgot-password">Forgot your password?</button>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=20260324g"></script>
    <script src="js/auth.js?v=20260324g"></script>
</body>
</html>
