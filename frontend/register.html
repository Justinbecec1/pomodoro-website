<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/config.local.js"></script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Pomodoro Timer</h1>
            <p class="auth-subtitle">Create your account</p>
            
            <div id="error-message" class="error-message" style="display: none;"></div>
            <div id="success-message" class="success-message" style="display: none;"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="display-name">Full Name</label>
                    <input 
                        type="text" 
                        id="display-name" 
                        name="display-name" 
                        placeholder="Enter your full name" 
                        autocomplete="name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email" 
                        autocomplete="email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="At least 6 characters"
                            autocomplete="new-password"
                            minlength="6"
                            required
                        >
                        <button type="button" class="toggle-password" aria-label="Show password">👁</button>
                    </div>
                    <small style="color: var(--text-secondary); font-size: 12px;">Minimum 6 characters</small>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-password-wrapper">
                        <input
                            type="password"
                            id="confirm-password"
                            name="confirm-password"
                            placeholder="Confirm your password"
                            autocomplete="new-password"
                            minlength="6"
                            required
                        >
                        <button type="button" class="toggle-password" aria-label="Show password">👁</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in here</a></p>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=20260430"></script>
    <script src="js/auth.js?v=20260430"></script>
    <script src="js/register.js?v=20260430"></script>
</body>
</html>
