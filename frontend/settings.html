<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - Settings</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/tab-page.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="navbar-brand">Pomodoro Timer</h1>
            <div class="navbar-menu">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="timer.html" class="nav-link">Timer</a>
                <a href="tasks.html" class="nav-link">Tasks</a>
                <a href="progress.html" class="nav-link">Progress</a>
                <a href="settings.html" class="nav-link active">Settings</a>
                <button id="logout-button" class="btn btn-secondary">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container nav-main-container">
        <div class="dashboard-header">
            <h1>Settings</h1>
            <p>Manage your profile and profile photo.</p>
        </div>

        <div class="tab-card settings-card">
            <h2>Profile</h2>

            <div class="profile-avatar-wrap">
                <img id="settings-avatar-image" class="profile-avatar-image" src="" alt="Profile picture">
            </div>

            <p id="settings-profile-name" class="settings-profile-text">Loading profile...</p>
            <p id="settings-profile-email" class="settings-profile-subtext"></p>

            <div class="settings-upload-row">
                <input id="settings-avatar-file" class="settings-avatar-file" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
                <button id="settings-avatar-upload" class="btn btn-primary" type="button">Upload Profile Picture</button>
            </div>

            <p id="settings-avatar-status" class="settings-avatar-status" aria-live="polite"></p>
        </div>
    </div>

    <script src="js/api.js?v=20260324j"></script>
    <script src="js/auth.js?v=20260324j"></script>
    <script src="js/settings.js?v=20260324j"></script>
</body>
</html>
